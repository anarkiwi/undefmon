[function."$12EE"]
name  = "sidtab_refetch_v0_sc1"
role  = "V0 sidcall1 row-refetch path."
notes = "Entered when v0_sc1_counter underflows. Reads the current row's hi byte from sidtab_row_hi; if non-zero it's the row's runtime ptr-hi (post-LOAD: usually $5F). If zero, the row is a JP marker — the cascade reads the redirect target from sidtab_row_lo,Y, re-loads Y from it, and re-reads sidtab_row_hi at the redirected row for the actual ptr-hi (see JP_redirect_reread). The new row's DL byte goes into v0_sc1_counter, the row index advances, and sidtab_row_apply applies the row. The JP redirect (sidtab_row_hi[Y] == 0) is how tunes hold a voice on a single sustain cascade indefinitely — a self-loop pair keeps the voice alive for the lifetime of a note."

