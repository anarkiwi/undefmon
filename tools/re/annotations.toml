internal_notes = "2026-05-16 sub-F deep-RE pinned the state-machine fully. Prior annotations on $8717/$8734/$8751/$876E mislabelled the arms (called $8717 'W lo-nibble' when it's actually 'R lo-nibble' from $71C0 = $10 = CTRL+R; called $8734 'W hi-nibble' when it's actually the shared W+R hi-nibble from $71C0 = $20). Corrected entries below. Also: harness probe found CTRL+Z chord fires $878B (G page-jump), NOT $8751 — defMON's kbd_scan decodes CTRL+Z's matrix scan to the same kbd_decoded_key value $1A as CTRL+G (NOT $11 as the $8677 CPY arm expects), so $8751/$876E are unreachable from any held-CTRL+Z held_modifier_sequence and need different chord shape OR direct mem_set of $0E44 = $11."

