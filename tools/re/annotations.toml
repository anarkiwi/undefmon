# ──────────────────────────────────────────────────────────────────────
# Per-PC IMM operand overrides — give specific `#$XX` immediate
# operands a symbolic name. The emitter looks up the static byte at
# `pc + 1`, emits a NAMED CONSTANTS equate (`<NAME> = $XX`), then
# renders the instruction's `#$XX` as `#<NAME>`. Manual overrides
# take precedence over the automatic `value_names` substitution.
#
# Schema:
#   [imm."$XXXX"]
#   name = "SYMBOLIC_NAME"   # valid assembler identifier; UPPER_SNAKE convention
#
# Use when an immediate isn't bound to a value_names enum but reads
# clearer as a named threshold/constant — typically `(SBC|ADC|AND|ORA)
# #$XX` inside arithmetic chains the cmp_facts walker would otherwise
# leave as bare hex in the rendered condition.
# ──────────────────────────────────────────────────────────────────────

[imm."$0D2B"]
name = "SPEEDADJ_PRESET_BOUND"

# The downstream BCS at $0D2D tests `(input_byte >> 2) & $7F ≥ $07`
# — i.e., "is the requested preset index within the 4-preset table at
# $0DA4/$0DA8?". Override the slug so the long lhs+RHS chain doesn't
# bloat the equates section.
[branch."$0D2D"]
condition = "preset index ≥ SPEEDADJ_PRESET_BOUND (4-preset table bounds check)"


