name     = "V0_gate_n_branch"
role     = "body at V0_gate_n_branch-v0_gate_n_tail fires when GATE_N bit 4 is set in the row flag."
notes    = "Reads the NOTE byte (the LDA operand is patched to point at pat_base + Y), latches it into both the per-voice transpose buffer (for sidTAB TR columns) and the pitch oscillator's current_note. Then zeros V0's slide accumulator lo/hi/mode in one pass (X is $00 at this point). The slide-mode reset is the critical bit — see pitch_slide_oscillator for why."
evidence = "Slide-reset finding verified 2026-05-13 against .GLOW WORM frame 1570+ drift — without this reset a row 10 STop with slide_mode=$E0 keeps integrating across subsequent GATE_N events."

[region."$11A7"]
name  = "v0_gate_n_tail"
role  = "V0_gate_n_branch tail — write current_note_v0 (current_note write) + the three X→voice_record_v0/v0_slide_acc/slide_mode_v0 slide-accumulator zeros."
notes = "Falls through to increment Y at v0_gate_n_tail and the →gate when positive at v0_gate_n_tail that checks the next flag bit."

[region."$11BD"]
name  = "V0_row_read_tail"
role  = "after the 3 step-byte loops, advance pat_base by Y (= 4 bytes per row, plus any extra step bytes consumed)."
notes = "A←Y + clear-carry + A+=v0_freq_lookup_smc → write v0_freq_lookup_smc; →V0_row_read_tail when no-carry + increment v0_freq_lookup_smc_hi propagates carry to pat_base_hi. Then A←$0F + write A&X→v0_row_timer (undocumented opcode $8F = A & X → mem) lands flag.dur_nibble into the V0 row timer."

[region."$11CC"]
name  = "SAX_v0_dur_nibble"
role  = "undocumented opcode $8F ($write A&X→abs) at SAX_v0_dur_nibble."
notes = "SAX v0_row_timer (undocumented NMOS opcode $8F, 3 bytes). Stores A & X to absolute address v0_row_timer. With A=$0F (from V0_row_read_tail) and X=row.flag_byte (set from the row's flag at v0_row_dur_sax_smc-v0_gate_n_tail), the result is flag & $0F = duration nibble — which becomes the next V0 row timer reload. V1 analog at row_read_body_v2_ldy_smc ($8F D2 11 → SAX v1_row_timer); V2 analog at row_advance_band_v2_ldy_smc ($8F 5A 12 → SAX v2_row_timer). Each lands the row's dur nibble into that voice's timer reload slot."

[region."$12DE"]
name  = "row_advance_band_end"
role  = "Last byte of the row-advance band — `write A&X→v2_row_timer` opcode tail at row_advance_band_v2_ldy_smc-row_advance_band_end inside row_advance_band_v2's V2 patch path."
notes = "End marker for the row_advance_gate-row_advance_band_end row-advance gate + 3-voice row-read region; fall-through from row_advance_band_end lands at sidtab_cascade_entry. Sub-frame NMIs reach sidtab_cascade_entry via jump from player_sound_update_jmp_tail (skipping the row-advance band entirely); main-tick NMIs reach sidtab_cascade_entry via fall-through after one of row_advance_band_v0/row_advance_band_v1/row_advance_band_v2 jumps through."

[region."$12ED"]
name           = "v0_transpose_buffer"
role           = "operand byte of `write v0_transpose_buffer` written by GATE_N branch at V0_gate_n_branch."
notes          = "Holds the raw NOTE byte from V0's pattern row; subsequent sidTAB TR columns ADD their offset against this base (see sidtab_row_apply_tr_handler-sidtab_row_apply_tr_tail inside sidtab_row_apply)."
internal_notes = "Pre-pass13 bug in preframr stored v.transpose (always 0) here instead of the raw NOTE, making TR'd sidcall rows play absolute notes — biggest single source of V0/V1/V2 freq mismatches in .GLOW WORM back half."

[region."$12F9"]
name  = "JP_redirect_reread"
role  = "read sidtab_row_hi,Y at JP_redirect_reread after the Y←A at sidtab_refetch_v0_sc1."
notes = "Executes only when sidtab_refetch_v0_sc1 →was when nonzero not taken (= first read of sidtab_row_hi was zero = JP marker). Re-reads sidtab_row_hi at the redirected row; that second read MUST be non-zero (= runtime ptr-hi, typically $5F). A double-zero would loop infinitely through JP_redirect_reread — defMON tunes never produce that on-disk shape."

[region."$1310"]
name  = "sidtab_cascade_v1_sc1"
role  = "V1 sidcall1 cascade entry."
notes = "Same 6-instruction prologue as sidtab_cascade_entry (A←$FF + →refetch_v1_sc1 when zero + bmi to next cascade step). Counter v1_sc1_counter; row index v1_sc1_row_idx; refetch at v1_sc1_refetch; X=$31 (V1) at v1_cascade_slot_triple; call sidtab_row_apply at v1_cascade_slot_triple."

[region."$1341"]
name  = "sidtab_cascade_v2_sc1"
role  = "V2 sidcall1 cascade entry."
notes = "Counter v2_sc1_counter; row index v2_sc1_row_idx; refetch at v2_cascade_slot_triple; X=$62 (V2) at v2_cascade_slot_triple; call sidtab_row_apply at v2_cascade_slot_triple."

[region."$1372"]
name  = "sidtab_cascade_v0_sc2"
role  = "V0 sidcall2 cascade entry."
notes = "Counter v0_sc2_counter; row index v0_sc2_row_idx; refetch at v0_sc2_cascade_slot_triple; X=$00 (V0) at v0_sc2_cascade_slot_triple; call sidtab_row_apply at v0_sc2_cascade_slot_triple."

[region."$13A3"]
name  = "sidtab_cascade_v1_sc2"
role  = "V1 sidcall2 cascade entry."
notes = "Counter v1_sc2_counter; row index v1_sc2_row_idx; refetch at v1_sc2_cascade_slot_triple; X=$31 (V1) at v1_sc2_cascade_slot_triple; call sidtab_row_apply at v1_sc2_cascade_slot_triple."

[region."$13D4"]
name  = "sidtab_cascade_v2_sc2"
role  = "V2 sidcall2 cascade entry."
notes = "Counter v2_sc2_counter; row index v2_sc2_row_idx; refetch at v2_sc2_cascade_slot_triple; X=$62 (V2) at v2_sc2_cascade_slot_triple; call sidtab_row_apply at v2_sc2_cascade_slot_triple. Tail fall-through (or jump pitch_slide_oscillator) reaches the pitch oscillator."

[region."$1E00"]
name  = "dl_per_step_counters"
role  = "DL column, indexed by sidTAB row Y."
notes = "$00..$7F = hold this row for that many frames; $80..$FF = STop (freeze + gate-off, bmi in cascade dispatches to bmi-fall-through that skips the row-refetch). Read by all 6 cascade refetches at JP_redirect_reread/v1_cascade_slot_triple/v2_cascade_slot_triple/v0_sc2_cascade_slot_triple/v1_sc2_cascade_slot_triple/v2_sc2_cascade_slot_triple — the byte at dl_per_step_counters,Y becomes the next step counter via write v0_sc1_counter,X. Initial $FF from player_init means each cascade slot is dormant until GATE_A/B re-arms with counter=0. Implicitly written by the LOAD-time secondary pass and by sidTAB-editor save. Reference tune slot 7 freeze = dl_per_step_counters[7] = $80."

[region."$1453"]
name  = "pitch_no_slide_path"
role  = "slide_mode == 0 branch (→pitch_no_slide_path when zero from pitch_oscillator_voice_loop_body)."
notes = "Looks up the 16-bit pitch for current_note from note_pitch_lut_lo/note_pitch_lut_hi, adds pitch_base (per-voice detune: V0=$00 / V1=$01 / V2=$02 — pre-loaded into voice_record_v0/ps_depth_v1/voice_record_v2 at offset +6), and writes the result into the per-voice freq-patch slots. Without the per-voice detune all three voices producing the same NOTE phase-lock into a static pitched click."

[region."$1469"]
name           = "pitch_portamento_path"
role           = "slide_mode $01..$7F branch (→pitch_portamento_path when positive from pitch_oscillator_voice_loop_body)."
notes          = """
Computes target NOTE = current_note + slide_mode (positive interval). The
adjacent-semitone interval LUTs (interval_lut_lo_a/b, interval_lut_hi_a/b)
give the per-frame step (= LUT_b[target] − LUT_a[target] for each byte),
which is patched into the self-modifying ADC operands inside this path.
The 16-bit pitch for current_note is then read from note_pitch_lut_lo/hi
and the patched step is added to it before writing the result to the
per-voice freq-patch slots.

This is NOT the active-slide integration path — it's a one-shot pitch
interpolation, not a per-frame integrator. The accumulator in
v0_slide_acc,X is not updated here, so re-entering this path each frame
re-computes the SAME interpolation from the SAME current_note. Portamento
therefore only animates when current_note changes (e.g. a GATE_N row
sidTAB-TR-shifts the note mid-portamento). Unverified.
"""
internal_notes = "preframr's defmon_player currently has a no-slide fallback for this path; V2 freq drift past frame 1570 in .GLOW WORM is the visible symptom."

[region."$1495"]
name  = "ps_sweep_entry"
role  = "pulse-width sweep loop, called from BOTH pitch_oscillator_voice_loop_body (active-slide tail) and pitch_no_slide_path (no-slide tail)."
notes = "Y←ps_depth_v0,X (signed depth+direction byte). →pitch_oscillator_loop_tail when zero (depth 0 → exit to loop tail, no PW change this frame). →ps_sweep_sub_path when positive (positive depth → SUB path); else fall through to ADD path at ps_sweep_add_path_smc-ps_sweep_anc_imm_smc. ps_sweep_hi_clamp/ps_sweep_lo_clamp are the clamp branches; ps_sweep_sub_path is the SUB path; pitch_oscillator_loop_tail is the X-loop tail. Note that ADD/SUB direction here is *inverted* relative to typical convention: depth bit 7 SET (negative) → ADC (ADD); bit 7 CLEAR (positive) → SBC (SUB)."

[region."$14B4"]
name  = "ps_sweep_hi_clamp"
role  = "pulse-width high clamp at $0F."
notes = "Reached after the ADD path's PW-lo overflow. If PW hi has reached $0F (max), flip the direction bit in ps_depth_v0,X (EOR $80) and clamp PW lo to $F8 — the sweep reverses on the way back down. Otherwise just bump PW hi. Implements the top end of the triangle PW sweep (ps_sweep_lo_clamp mirrors at the bottom)."

[region."$14C2"]
name  = "ps_sweep_lo_clamp"
role  = "pulse-width low clamp at $00 (mirrors ps_sweep_hi_clamp hi clamp)."
notes = "Reached on PW-lo underflow during the SUB path. If PW hi has hit 0, clamp PW lo to $01 and flip the direction bit in ps_depth_v0,X (EOR $80) so the sweep reverses upward. Otherwise just decrement PW hi. Together with ps_sweep_hi_clamp produces the triangle-wave PW sweep that audibly modulates filter-less tunes."

[region."$14D0"]
name  = "ps_sweep_sub_path"
role  = "PW depth positive branch (entered from →ps_sweep_sub_path when positive at ps_sweep_entry)."
notes = "Subtracts ps_depth from the per-voice PW lo (carry-in is uncontrolled — see PS_sweep_sbc_c_in_uncontrolled). No underflow → exit. On underflow: if PW hi is already 0, jump to ps_sweep_lo_clamp to flip direction; otherwise decrement PW hi and exit."

[region."$14D3"]
name           = "PS_sweep_sbc_c_in_uncontrolled"
role           = "operand of the A-=ps_depth_v0,X at PS_sweep_sbc_c_in_uncontrolled."
notes          = "Carry-in is NOT explicitly set — the set-carry was issued at pitch_portamento_path (portamento path) or implicitly from pitch_oscillator_voice_loop_body (active slide). In practice this means A-=may behave as 'sbc - 1' if a prior carry-clearing operation happened."
internal_notes = "preframr approximates C-in=0; correlation delta vs C-in=1 is <0.001 in measured tunes but may diverge on long PS sweeps."

[region."$14E2"]
name  = "ps_sweep_tail"
role  = "end of the various PS sweep branches."
notes = "jump pitch_oscillator_loop_tail from the four exit points (ps_sweep_anc_imm_smc/ps_sweep_hi_clamp/ps_sweep_lo_clamp/pitch_oscillator_loop_tail directly). All paths land on pitch_oscillator_loop_tail A←X + SBX #$31 (undocumented opcode $CB at pitch_oscillator_loop_tail_smc = AXS / SBX: X := A and X minus #$31)."

[region."$14E3"]
name  = "pitch_oscillator_loop_tail"
role  = "A←X (A := X = $62/$31/$00); SBX #$31 ($CB $31 — undocumented AXS opcode: X := (A and X) - #$31, sets carry as for sbc); →groove_song_position when negative if result negative (X went below $00 = wrapped from $00); else jump pitch_oscillator_voice_loop_body (re-enter loop with X = X - $31)."
notes = "At entry X=$62 → X-$31 = $31 (V1 next); X=$31 → X-$31 = $00 (V0 next); X=$00 → wrap (→fires) when negative → return at groove_song_position. The AXS opcode is unusual — `X := (A and X) - #imm` in a single 2-byte instruction without clobbering A. Kick Assembler assembles it from the `axs #$31` mnemonic."

[region."$14F8"]
name  = "slide_dec_lut_lo"
role  = "Slide-decrement LUT base (lo bytes) — aliases a 576-byte backing region shared with several other pitch tables."
notes = """
Read at pitch_oscillator_voice_loop_body inside the active-slide subtractive path (`A-=slide_dec_lut_lo,Y`).

The backing region at slide_dec_lut_lo-sidtab_row_apply_tr_tail is also addressed via pitch_lut_band (slide-inc lo), slide_dec_lut_hi (slide-dec hi), slide_inc_lut_hi (slide-inc hi), note_pitch_lut_lo/note_pitch_lut_hi (NOTE_PITCH lo/hi), and interval_lut_lo_a/interval_lut_hi_a + interval_lut_lo_b/interval_lut_hi_b (adjacent-semitone interval lo/hi). Tables overlap in addressing — slide_dec_lut_lo sits $24 bytes before note_pitch_lut_lo so the same Y index walks different segments of the same exponential pitch ramp.
"""

[region."$16AF"]
name  = "sidtab_cascade_marker_end"
role  = "End-of-sidtab-cascade marker — last byte ($00 padding) before sidtab_row_apply."
notes = "Not code; the cascade tail at v2_sc2_cascade_slot_triple JSRs sidtab_row_apply and falls through to the pitch oscillator at pitch_slide_oscillator instead of running into sidtab_cascade_marker_end."

[region."$16E7"]
name  = "sidtab_row_apply_tr_handler"
role  = "TR column entry inside sidtab_row_apply."
notes = "Bit 3 of the low bitmap selects the TR branch: read row_byte + clear-carry + A+=v0_transpose_buffer,X (V0 transpose buffer = raw NOTE from last GATE_N). Result is current_note + row.tr_offset → write current_note_v0,X. Per-voice v0_transpose_buffer,X is the transpose base; for V1 the analog lives at v1_cascade_slot_triple (mirror written by row_read_body_v1 row-read), for V2 at v2_cascade_slot_triple."

[region."$16F2"]
name  = "sidtab_row_apply_tr_tail"
role  = "TR handler tail — final write current_note_v0,X (current_note write) inside sidtab_row_apply_tr_handler's branch."
notes = "Falls through to the bit-2 (AF / slide_mode) dispatch at sidtab_row_apply_tr_tail+. End of TR-column body."

