role  = "Voice-0 working record (interleaved with V0 SID-write code)."
notes = """
Per-voice records at voice_record_v0 (V0) / voice_record_v1 (V1) / voice_record_v2 (V2); X = $00 / $31 / $62 selects the voice. Each record holds:
  - slide accumulator lo/hi.
  - slide mode flag (slide_mode_v0,X — neg=down, pos=up, 0=hold).
  - vibrato depth (ps_depth_v0,X).
  - pitch base (pitch_base_v0,X).
  - voice-bit mask + complement (ps_depth_v0 = $01/$FE for V0, $02/$FD for V1, $04/$FB for V2).
  - many immediate operands inside player_play_body's SID-write instructions that double as runtime register state.
"""
constraints = { do_not_reorder = true, load_bearing_offsets = ["$1022..$10A9"], because = "slide oscillator borrows pw_lo_patch_v0/pw_hi_patch_v0 as a transient pitch accumulator between sidTAB writes — the same immediate-operand bytes serve both the sidTAB writer and the pitch oscillator, addressed at hard-coded $31 / $62 strides from the V0 base. Any reorder shifts those offsets and the per-voice indexing in pitch_slide_oscillator + sidtab_row_apply silently lands on wrong bytes." }

[region."$101E"]
name     = "ps_depth_v0"
role     = "V0 ps_depth slot — pulse-sweep / vibrato depth byte inside the V0 per-voice record."
notes    = "Per-voice mirrors at ps_depth_v1 (V1) and voice_record_v2 (V2), stride $31; addressed as `ps_depth_v0,X`. Read+written by the pitch-slide oscillator at pitch_slide_oscillator and by the sidTAB PS column writer at sidtab_row_apply. See voice_record_v0 for the full V0 SID-write band layout (PW/freq/SR/AD/ctrl patch slots and their dual sidtab-writer / slide-oscillator use)."
evidence = "Documented inline in the $1019 notes block; mentioned in AGENTS cross-tune validation section."

[region."$1023"]
name     = "pw_lo_patch_v0"
role     = "V0 pulse-width LOW patch slot — immediate operand of the `X→SID_V1_PW_LO` ldx# at player_play_body."
notes    = "Per-voice mirrors at v1_sid_write_band (V1) and v2_sid_write_band (V2), stride $31; addressed as `pw_lo_patch_v0,X` with X = $00/$31/$62. Dual-purpose: the sidTAB writer at sidtab_row_apply stores PW-lo here (bit 1 of low bitmap → `(pw_lo_patch_v0,X = byte & $F0)`), and the slide oscillator at pitch_slide_oscillator borrows the same byte as the pitch slide accumulator's working register between sidTAB writes."
evidence = "Documented inline in the $1019 notes block; broken out as its own region for direct address-lookup."

[region."$1025"]
