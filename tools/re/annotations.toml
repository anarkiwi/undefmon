# defMON RE annotations
#
# Single source of truth for facts about specific addresses in defmon-static.bin.
# Merged into `defmon.asm` by emit_defmon_source.py as block comments
# above the relevant code-start labels and segment headers.
#
# Schema (post-split):
#   [function."$XXXX"]   for code-starts
#   [region."$XXXX"]     for non-code state / tables
#     name      = "<lowercase-snake-case>"           (label, ≤64 chars)
#     signature = "void fn(byte arg1, byte arg2)"   (C-like, optional)
#     role      = "<one-sentence semantic role>."  (≤200 chars target)
#     callers, inputs, outputs, registers_clobbered,
#     variables_changed, values, notes               (all gated for prose)
#     evidence, internal_notes                       (RE journal, ungated)
#
#   `signature` is pushed to Ghidra via ApplyFunctionSignatureCmd —
#   decompile renders typed parameters (`byte palette_index` instead
#   of `bVar1`). 6502 cspec maps arg1→A, arg2→X, arg3→Y, return→A.
#   Functions taking inputs from memory globals: use `void fn(void)`
#   and let Ghidra infer the global reads. Functions returning via X
#   or Y can't be expressed in the default cspec — keep `void` and
#   document the real return register in the `outputs:` prose field.
#
#   [refuted."$XXXX"]
#     former_name = "..."                        (NOT label-eligible)
#     ruling      = "..."
#     evidence    = "..."
#
#   [smc_dispatch."$XXXX"]   for self-modifying JSR/JMP dispatchers
#     description   = "<what the dispatcher does>"
#     patch_sources = ["$YYYY", ...]    (PCs that write the operand bytes)
#     targets       = [                 (catalogued call targets; may be [])
#       { addr = "$AAAA", name = "...", context = "<optional gate>" },
#     ]
#
#   The emitter renders a comment block above each JSR/JMP with the
#   metadata. ghidra_import.py adds COMPUTED_CALL (JSR) or
#   COMPUTED_JUMP (JMP) refs from `switch_pc` to each listed target;
#   auto-discovery warns when a SMC dispatch site is present in the
#   binary but has no annotation.
#
#   [smc_branch."$XXXX"]   for self-modifying conditional branches
#     description   = "<what the branch-offset patch does>"
#     patch_sources = ["$YYYY", ...]    (PCs that write the offset byte)
#     default_target = "$AAAA"          (offset's static rendering, optional)
#
#   [smc_opcode."$XXXX"]   for self-modifying opcode-byte flips
#     description       = "<what the flip toggles>"
#     patch_sources     = ["$YYYY", ...]
#     candidate_opcodes = ["BPL", ...]   (mnemonics the byte can become
#                                          at runtime; auto-traced if
#                                          curator leaves it blank)
#
# Verify gates run automatically on `make verify`.

