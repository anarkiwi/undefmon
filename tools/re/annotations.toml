[region."$1B00"]
name           = "arranger_v0_sid1"
role           = "song-position → V0 pattern_num (256 entries)."
notes          = "When V0 entry has bit 7 set (typically $FF), it's a JUMP COMMAND, NOT a pattern reference: the jump target row is read from V1's arranger at the same song-position (arranger_v1_sid1,Y), and the repeat count is read from V2's (arranger_v2_sid1,Y). Behaviour at arranger_advance_song: V2 == 0 → unconditional immediate jump to V1[Y]; V2 != 0 → arm groove timer (groove_compare_slot := Y, groove_repeat_counter := V2) and jump to V1[Y] this frame; on a subsequent re-visit to the same row, decrement groove_repeat_counter — when it underflows the player advances the song-position by 1 (past the FF row) instead of jumping. So V2 = 'number of jumps to take before falling through'; V2 = 0 = infinite loop. Target and count live in V1 and V2 arrangers at the same row Y, not in the V0 arranger itself."
internal_notes = "Earlier interpretation (per defMON wiki's `FFXXYY` triplet description) read the jump command as a triplet inside the V0 arranger, which is wrong. Verified 2026-05-13 by walking $10EC-$110F + the song-position update at $1144 STY $10EB."

[region."$1C00"]
name  = "arranger_v1_sid1"
role  = "song-position → V1 pattern_num."
notes = "Dual-purpose: on rows where V0 == $FF the V1 entry at the same row is the JUMP TARGET row index instead of V1's pattern number. See arranger_v0_sid1 for the jump-command shape."

[region."$1D00"]
name  = "arranger_v2_sid1"
role  = "song-position → V2 pattern_num."
notes = "Dual-purpose: on rows where V0 == $FF the V2 entry is the jump-command repeat count ($00 = infinite). See arranger_v0_sid1."

[region."$1F00"]
name           = "pattern_bank"
role           = "LIVE pattern bank base."
notes          = """
Each pattern = 128 B = 32 steps × 4 bytes (flag, slot_a, slot_b, note); GATE_N (flag bit 4) must be set for a note to actually play.

Player IRQ reads from here every frame. Patterns are addressed via
pat_base_lo/hi tables at pat_base_lo/pat_base_hi — pat_num N lives at
(pat_base_hi,N) << 8 | (pat_base_lo,N).

Default-stride layout (most factory tunes use $80 stride):
pat$00 = pattern_bank, pat$01 = pat01_default_base, pat$02 = pat02_default_base, pat$03 = pat03_default_base_sid2_v3, pat$04 = pat04_default_base_sid2_v4,
pat$05 = pat05_default_base_sid2_v5,... Stride is per-tune via pat_base_lo/pat_base_hi tables; do not assume
linear $80 in synthesised tunes. See pat01_default_base/pat02_default_base/pat03_default_base_sid2_v3/pat04_default_base_sid2_v4/pat05_default_base_sid2_v5 for
boundary markers.
"""
internal_notes = "Hit count: $1F00 alone got 2292 LOAD hits in 1.5s of warp play (probe_player_irq.py)."

