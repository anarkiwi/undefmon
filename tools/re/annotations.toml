role  = "walks the song-position arrangers (arranger_v0_sid1/arranger_v1_sid1/arranger_v2_sid1) until landing on a non-FF V0 entry."
notes = "Reads V0's arranger byte at the current row. Positive values are pattern numbers — pat_base pointers load from those and the song advances normally. Negative values (high bit set, typically $FF) are JUMP COMMANDs: target row comes from V1's arranger at the same index, repeat count from V2's. V2 == 0 means unconditional immediate jump (Y := V1[Y]); V2 != 0 arms a groove timer (groove_compare_slot := Y, groove_repeat_counter := V2) on first visit and decrements it on each re-visit, falling through past the FF row only when the timer underflows. See arranger_v0_sid1 for full FF-jump arranger semantics."

