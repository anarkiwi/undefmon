role     = "V0 pulse-width HIGH patch slot — immediate operand of the `write SID_V1_PW_HI` lda# at pw_lo_patch_v0."
notes    = "Per-voice mirrors at v1_sid_write_band (V1) and v2_sid_write_band (V2), stride $31; addressed as `pw_hi_patch_v0,X`. The sidTAB writer at sidtab_row_apply stores the FULL byte here (bit 1 of low bitmap → `pw_hi_patch_v0,X = byte`; pw_lo_patch_v0,X gets `byte & $F0`), implementing defMON's 12-bit pulse-width packing where pw_hi_patch_v0 is the top 8 bits and pw_lo_patch_v0's high nibble is the bottom 4. Slide oscillator at pitch_slide_oscillator also borrows this slot as the pitch slide accumulator hi byte."
