[region."$0F90"]
name     = "kbd_scancode_lut"
role     = "scancode→screen-code LUT (64 bytes, kbd_scancode_lut through scancode 63)."
notes    = """
Read by kbd_scan inner walker at kbd_scan_inner_continue: `read kbd_scancode_lut,Y` with Y = scancode position (0..63). Value = defMON internal key code stored to kbd_decoded_key (KEY_NONE = no binding, e.g. modifier keys filtered). Walker order: kbd_scan scans rows 7 down to 0; within each row, column 0 first via ror. So scancode Y = ((7 - row) * 8) + col, with row 7 occupying scancodes 56..63 (Y=63 = row 7 col 0 = RUN/STOP key in the C64 matrix), and row 0 occupying scancodes 0..7. The LUT fills the whole 64-entry table to its last byte (scancode 63). A zero pad then runs up to splash_build_date_string, the splash build-date string (printed separately, not part of this LUT).

Decoded key map by scancode (Y), keyed by the C64 keymatrix row/col:

 Scancode | C64 matrix    | kbd_scancode_lut value | Decoded as
 ---------+---------------+------------------------+--------------------
 0        | row 0 col 0   | $6F                    | INSTDEL
 1        | row 0 col 1   | $B5                    | RETURN
 2        | row 0 col 2   | $B3                    | CRSRLR
 3        | row 0 col 3   | $B1                    | F7
 4        | row 0 col 4   | $B7                    | F1
 5        | row 0 col 5   | $6A                    | F3
 6        | row 0 col 6   | $92                    | F5
 7        | row 0 col 7   | $84                    | CRSRUD
 8        | row 1 col 7   | $FF                    | LSHIFT (filtered)
 9        | row 1 col 6   | $05                    | E
 10       | row 1 col 5   | $13                    | S
 11       | row 1 col 4   | $1A                    | Z (see super-cmd note)
 12       | row 1 col 3   | $34                    | "4"
 13       | row 1 col 2   | $01                    | A
 14       | row 1 col 1   | $17                    | W
 15       | row 1 col 0   | $33                    | "3"
 ...      | (rows 2-6)    |                        |
 57       | row 7 col 6   | $11                    | Q (see super-cmd note)
 58       | row 7 col 5   | $FF                    | CBM (filtered)
 60       | row 7 col 3   | $32                    | SPACE
 62       | row 7 col 1   | $1F                    | LEFTARROW
 63       | row 7 col 0   | $31                    | RUN/STOP

super_cmd_dispatch dispatch keys are *position-based*, not ASCII or
PETSCII — the parser's per-letter prefix arms compare against the
decoded-key code returned by this LUT:
 CMP #$13 → S key — CTRL+S
 CMP #$17 → W key — CTRL+W
 CMP #$12 → R key (row 2 col 1) — CTRL+R
 CMP #$11 → Q key — CTRL+Q
 CMP #$1A → Z key — CTRL+Z
defMON's internal slot names (super_arg_slot_q 'Z-slot',
super_arg_slot_z 'G-slot') follow decoded-byte value, not
user-facing letter — see super_cmd_dispatch.
"""
evidence = "tools/re/dasm6502 --start 0x0F90 --len 64 (raw LUT bytes); cross-validated against /tmp/kbd-coverage/S8.json events (CTRL+Z chord fires CMP #$1A arm $878B = decoded $1A; CTRL+W chord fires CMP #$17 path = decoded $17). Walker order verified by tracing $0E47 inner loop $0ED9-$0EE0."

