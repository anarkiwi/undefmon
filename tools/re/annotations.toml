role  = "Sub-frame sentinel — the OPCODE byte of the `lda #$FF; bpl row_advance_band_v0` instruction at subframe_sentinel_opcode."
notes = "Normally LDA-imm, making the instruction A←$FF → A=$FF (negative) → →not when positive taken → row advance runs. Patched to RTS by player_sound_update, which turns the instruction into an early-return — when the call player_play_body at player_sound_update flows into subframe_sentinel_opcode, the return bails out of player_play, skipping the row-advance band. player_sound_update restores the LDA-imm opcode. NOT a data byte; treating it as one (e.g. writing $FF to subframe_sentinel_opcode to 'force play mode') replaces the read opcode with an illegal jam opcode."

