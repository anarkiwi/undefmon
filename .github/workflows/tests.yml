name: tests
# Run on pushes to main and on PRs. Avoid double-triggering a PR branch
# (push + pull_request at once), which makes two concurrent requests to
# the KickAss download host and trips its rate limit.
on:
  push:
    branches: [main]
  pull_request:
jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Java (Kick Assembler runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Cache KickAss.jar across runs. Key is pinned to the assembler
      # version so an upstream bump (new release asset + key) invalidates
      # cleanly. Once populated, CI hits no network for the jar at all.
      - name: Cache Kick Assembler
        id: cache-kickass
        uses: actions/cache@v6
        with:
          path: ~/kickass
          key: kickass-jar-v5.25

      - name: Download Kick Assembler
        if: steps.cache-kickass.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/kickass"
          # KickAss.jar is vendored as a release asset on this repo because
          # the upstream (theweb.dk) 415s GitHub Actions runner IPs. The
          # release URL is GitHub-to-GitHub, so it is always reachable.
          # sha256 is checked so a tampered/truncated asset fails loudly.
          curl -fsSL --retry 3 --retry-all-errors \
            https://github.com/anarkiwi/undefmon/releases/download/kickass-5.25/KickAss.jar \
            -o "$HOME/kickass/KickAss.jar"
          echo "9592a39336e73a1db8b4a7749256d62d29b113b1c7f0f6c86ea43870ebd9ae1f  $HOME/kickass/KickAss.jar" \
            | sha256sum -c -

      - name: Locate KickAss.jar (for round-trip)
        run: |
          jar="$(find "$HOME/kickass" -name KickAss.jar | head -1)"
          test -n "$jar" || { echo "KickAss.jar not found"; exit 1; }
          echo "KICKASS_JAR=$jar" >> "$GITHUB_ENV"

      - name: Install black (for the lint test)
        run: pip install black

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Reproduce defmon-static.bin from upstream .d64
        uses: docker/build-push-action@v7
        with:
          context: .
          target: export
          outputs: type=local,dest=artefacts
          cache-from: type=gha,scope=fetch-static
          cache-to: type=gha,mode=max,scope=fetch-static

      - name: Run unit tests (lint + dasm6502 + emit + round-trip)
        run: python -m unittest discover tests -v

      - name: Verify make rebuilds defmon.asm byte-for-byte
        run: |
          cp defmon.asm /tmp/defmon.asm.committed
          make clean
          make
          diff -q defmon.asm /tmp/defmon.asm.committed

      - name: Verify Makefile round-trip target
        run: make roundtrip

      - name: Annotation lint suite (schema, prose, coverage, callgraph)
        run: make lint

  ghidra-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Reproduce defmon-static.bin (Ghidra import consumes it)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: export
          outputs: type=local,dest=artefacts
          cache-from: type=gha,scope=fetch-static
          cache-to: type=gha,mode=max,scope=fetch-static

      - name: Reproduce artefacts/ghidra/*.json via Dockerfile.ghidra
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ghidra
          target: export
          outputs: type=local,dest=build/ghidra-fresh
          cache-from: type=gha,scope=ghidra-export
          cache-to: type=gha,mode=max,scope=ghidra-export

      - name: Diff-as-JSON against committed artefacts/ghidra/*.json
        run: python -m unittest tests.test_ghidra_export -v
