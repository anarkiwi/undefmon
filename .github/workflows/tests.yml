name: tests
# Run on pushes to main and on PRs. Avoid double-triggering a PR branch
# (push + pull_request at once), which makes two concurrent requests to
# the KickAss download host and trips its rate limit.
on:
  push:
    branches: [main]
  pull_request:
jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java (Kick Assembler runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Kick Assembler (for round-trip)
        run: |
          mkdir -p "$HOME/kickass"
          # theweb.dk 415s the default curl User-Agent (pose as a browser)
          # and rate-limits bursts, so retry on any error with a delay.
          curl -fsSL -A "Mozilla/5.0" \
            --retry 6 --retry-all-errors --retry-delay 10 \
            http://theweb.dk/KickAssembler/KickAssembler.zip \
            -o /tmp/kickass.zip
          unzip -q /tmp/kickass.zip -d "$HOME/kickass"
          jar="$(find "$HOME/kickass" -name KickAss.jar | head -1)"
          test -n "$jar" || { echo "KickAss.jar not found in download"; exit 1; }
          echo "KICKASS_JAR=$jar" >> "$GITHUB_ENV"

      - name: Install black (for the lint test)
        run: pip install black

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Reproduce defmon-static.bin from upstream .d64
        uses: docker/build-push-action@v7
        with:
          context: .
          target: export
          outputs: type=local,dest=artefacts
          cache-from: type=gha,scope=fetch-static
          cache-to: type=gha,mode=max,scope=fetch-static

      - name: Run unit tests (lint + dasm6502 + emit + round-trip)
        run: python -m unittest discover tests -v

      - name: Verify make rebuilds defmon.asm byte-for-byte
        run: |
          cp defmon.asm /tmp/defmon.asm.committed
          make clean
          make
          diff -q defmon.asm /tmp/defmon.asm.committed

      - name: Verify Makefile round-trip target
        run: make roundtrip

      - name: Annotation lint suite (schema, prose, coverage, callgraph)
        run: make lint

  ghidra-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Reproduce defmon-static.bin (Ghidra import consumes it)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: export
          outputs: type=local,dest=artefacts
          cache-from: type=gha,scope=fetch-static
          cache-to: type=gha,mode=max,scope=fetch-static

      - name: Reproduce artefacts/ghidra/*.json via Dockerfile.ghidra
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ghidra
          target: export
          outputs: type=local,dest=build/ghidra-fresh
          cache-from: type=gha,scope=ghidra-export
          cache-to: type=gha,mode=max,scope=ghidra-export

      - name: Diff-as-JSON against committed artefacts/ghidra/*.json
        run: python -m unittest tests.test_ghidra_export -v
